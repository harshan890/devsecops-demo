name: Deploy to ECS

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  # ─────────────────────────────────────────
  # JOB 1 — Unit Testing & Coverage Report
  # ─────────────────────────────────────────
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Run Unit Tests with Coverage
        run: npm test -- --coverage --run

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  # ─────────────────────────────────────────
  # JOB 2 — SAST with SonarQube
  # ─────────────────────────────────────────
  sonarqube:
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for SonarQube blame data

      - name: Download Coverage Report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=harshan890_devsecops-demo
            -Dsonar.organization=harshan890
            -Dsonar.sources=src
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.qualitygate.wait=true

  # ─────────────────────────────────────────
  # JOB 3 — Build & Trivy Image Scan
  # ─────────────────────────────────────────
  build-and-scan:
    runs-on: ubuntu-latest
    needs: sonarqube
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::150811559021:role/odic-new-harshan
          aws-region: us-east-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: docker build -t reactjs-harshan .

      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: reactjs-harshan:latest
          format: table
          output: trivy-results.txt
          exit-code: '1'              # Fails pipeline if CRITICAL found
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload Trivy Report
        uses: actions/upload-artifact@v4
        if: always()                  # Upload report even if scan fails
        with:
          name: trivy-report
          path: trivy-results.txt

      - name: Tag Docker Image
        run: |
          docker tag reactjs-harshan:latest \
          150811559021.dkr.ecr.us-east-2.amazonaws.com/reactjs-harshan:latest

      - name: Push Docker Image to ECR
        run: |
          docker push \
          150811559021.dkr.ecr.us-east-2.amazonaws.com/reactjs-harshan:latest

  # ─────────────────────────────────────────
  # JOB 4 — Deploy to ECS
  # ─────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-scan
    steps:
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::150811559021:role/odic-new-harshan
          aws-region: us-east-2

      - name: Force ECS Deployment
        run: |
          aws ecs update-service \
          --cluster ${{ secrets.ECS_CLUSTER }} \
          --service ${{ secrets.ECS_SERVICE }} \
          --force-new-deployment
